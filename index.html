<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bibliografía</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
    }

    .container {
      max-width: 850px;
      width: 100%;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px;
      padding: 50px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      color: white;
    }

    h1 {
      text-align: center;
      font-size: 2.5rem;
      margin-bottom: 35px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    p {
      line-height: 1.9;
      font-size: 1.08rem;
      margin-bottom: 20px;
      color: rgba(255,255,255,0.9);
    }

    @media (max-width: 768px) {
      .container {
        padding: 30px;
      }

      h1 {
        font-size: 2rem;
      }

      p {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Bibliografía</h1>

    <p>Ramon pillate la PS5 crack</p>
  </div>

</body>
</html>
